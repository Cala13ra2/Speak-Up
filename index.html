<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candid Pro</title>
  <style>
    :root {
      --dark-bg: #0a0e27;
      --card-bg: #141829;
      --input-bg: #1a1f3a;
      --text: #e4e6eb;
      --text-muted: #8a8d98;
      --border: #252d47;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--dark-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      height: 100%;
      max-width: 1400px;
      display: flex;
      background: var(--dark-bg);
      position: relative;
    }

    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      position: relative;
    }

    /* ===== INTRO ===== */
    .intro-screen {
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
      flex-direction: column;
    }

    .intro-content {
      max-width: 480px;
      text-align: center;
    }

    .logo {
      font-size: 56px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .intro-content h1 {
      font-size: 32px;
      margin: 16px 0 12px;
      font-weight: 700;
      line-height: 1.3;
    }

    .intro-content p {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.7;
      margin: 0 0 32px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-secondary:hover {
      background: rgba(99, 102, 241, 0.1);
    }

    /* ===== ADMIN PANEL ===== */
    .admin-panel {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .admin-sidebar {
      width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
    }

    .admin-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .admin-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .admin-stats {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      font-size: 12px;
    }

    .stat-badge {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      border: 1px solid var(--border);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .conversation-item {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .conversation-item:hover {
      background: rgba(99, 102, 241, 0.05);
      border-color: var(--border);
    }

    .conversation-item.active {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--accent);
    }

    .conv-user {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .conv-preview {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conv-status {
      font-size: 11px;
      margin-top: 6px;
      padding: 2px 6px;
      border-radius: 3px;
      display: inline-block;
      font-weight: 600;
    }

    .conv-status.waiting {
      background: rgba(251, 146, 60, 0.2);
      color: #fb923c;
    }

    .conv-status.replied {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .admin-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--dark-bg);
    }

    .admin-chat-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-user-info h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .admin-user-info p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .admin-chat-area {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message.own {
      align-items: flex-end;
    }

    .message-bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 6px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
    }

    .message.other .message-bubble {
      background: var(--input-bg);
      border: 1px solid var(--border);
    }

    .message.own .message-bubble {
      background: var(--accent);
      color: white;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: center;
    }

    .message.own .message-time {
      text-align: right;
    }

    .message.other .message-time {
      text-align: left;
    }

    .reply-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      max-height: 100px;
      resize: none;
      outline: none;
      transition: all 0.2s ease;
    }

    .input:focus {
      border-color: var(--accent);
    }

    .input::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      background: var(--accent);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-send:hover {
      background: var(--accent-hover);
    }

    /* ===== USER CHAT ===== */
    .user-chat-screen {
      flex-direction: column;
    }

    .user-chat-header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
      color: white;
    }

    .user-details h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }

    .user-details p {
      margin: 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-end {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-end:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .user-message-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-input-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--card-bg);
      border-radius: 6px;
      border: 1px solid var(--border);
      padding: 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .modal-content {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 12px 0 20px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .modal-btn-primary {
      background: var(--accent);
      color: white;
    }

    .modal-btn-primary:hover {
      background: var(--accent-hover);
    }

    .modal-btn-secondary {
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .modal-btn-secondary:hover {
      border-color: var(--accent);
    }

    .exit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s ease;
    }

    .exit-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    @media (max-width: 900px) {
      .admin-sidebar {
        width: 240px;
      }
    }

    @media (max-width: 640px) {
      .admin-panel {
        flex-direction: column;
      }

      .admin-sidebar {
        width: 100%;
        height: 180px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .admin-main {
        height: calc(100% - 180px);
      }

      .message-bubble {
        max-width: 85%;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- INTRO -->
    <div class="screen intro-screen active" data-screen="intro">
      <div class="intro-content">
        <div class="logo">Candid</div>
        <h1>Professional Feedback</h1>
        <p>Anonymous conversations. Direct support.</p>
        
        <div class="button-group">
          <button class="btn btn-primary" onclick="app.startUserMode()">I'm here to chat</button>
          <button class="btn btn-secondary" onclick="app.requestAdminAccess()">I'm the professional</button>
        </div>
      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="screen admin-panel" data-screen="admin">
      <div class="admin-sidebar">
        <div class="admin-header">
          <h3 class="admin-title">Conversations</h3>
          <div class="admin-stats">
            <span class="stat-badge" id="totalConversations">0 total</span>
            <span class="stat-badge" id="activeConversations">0 new</span>
          </div>
        </div>
        <div class="conversation-list" id="conversationList"></div>
        <button class="exit-btn" onclick="app.exitAdminMode()">Exit</button>
      </div>

      <div class="admin-main">
        <div id="adminChatArea" class="admin-chat-area">
          <div class="empty-state">
            <p>Select a conversation</p>
          </div>
        </div>
      </div>
    </div>

    <!-- USER CHAT -->
    <div class="screen user-chat-screen" data-screen="userChat">
      <div class="user-chat-header">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <h3 id="userUsername">Anonymous</h3>
            <p>Connected</p>
          </div>
        </div>
        <button class="btn-end" onclick="app.endUserChat()">End</button>
      </div>

      <div class="user-message-area" id="userMessageArea"></div>

      <div class="user-input-area">
        <textarea 
          class="input" 
          id="userInput" 
          placeholder="Type a message..."
          rows="1"
        ></textarea>
        <button class="btn-send" onclick="app.sendUserMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- ADMIN AUTH MODAL -->
  <div class="modal-overlay" id="adminAuthModal">
    <div class="modal">
      <h3 class="modal-title">Professional Access</h3>
      <div class="modal-content">
        <p>Enter your password:</p>
      </div>
      <input 
        type="password" 
        id="adminPassword" 
        class="input" 
        placeholder="Password"
        style="margin-bottom: 16px; width: 100%;"
      />
      <div class="modal-actions">
        <button class="modal-btn modal-btn-secondary" onclick="app.closeAdminAuth()">Cancel</button>
        <button class="modal-btn modal-btn-primary" onclick="app.verifyAdminPassword()">Sign in</button>
      </div>
    </div>
  </div>

  <!-- END CHAT MODAL -->
  <div class="modal-overlay" id="endChatModal">
    <div class="modal">
      <h3 class="modal-title">End conversation?</h3>
      <div class="modal-content">
        <p>You won't be able to continue after ending.</p>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-secondary" onclick="app.closeEndChatModal()">Keep talking</button>
        <button class="modal-btn modal-btn-primary" onclick="app.confirmEndUserChat()">End</button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      ADMIN_PASSWORD: 'claire2001',
      STORAGE_KEY: 'candid_conversations',
    };

    const utils = {
      generateUsername() {
        const adjectives = ['Curious', 'Thoughtful', 'Peaceful', 'Brave', 'Wise', 'Calm', 'Kind', 'Smart', 'Quick', 'Bright'];
        const animals = ['Fox', 'Eagle', 'Owl', 'Panda', 'Wolf', 'Bear', 'Raven', 'Dolphin', 'Tiger', 'Lion'];
        const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
        const animal = animals[Math.floor(Math.random() * animals.length)];
        const num = Math.floor(Math.random() * 100);
        return `${adj}${animal}${num}`;
      },

      formatTime(date) {
        const d = new Date(date);
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      },

      formatDate(date) {
        const d = new Date(date);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      },
    };

    const storage = {
      getConversations() {
        const data = localStorage.getItem(CONFIG.STORAGE_KEY);
        return data ? JSON.parse(data) : {};
      },

      saveConversations(conversations) {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(conversations));
      },

      addMessage(conversationId, message) {
        const conversations = this.getConversations();
        if (!conversations[conversationId]) {
          conversations[conversationId] = {
            id: conversationId,
            username: message.username,
            messages: [],
            createdAt: new Date().toISOString(),
          };
        }
        conversations[conversationId].messages.push(message);
        this.saveConversations(conversations);
      },
    };

    const app = {
      state: {
        currentScreen: 'intro',
        isAdmin: false,
        userChatId: null,
        currentConversationId: null,
        currentUser: null,
        lastConvLength: {},
      },

      showScreen(screenName) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelector(`[data-screen="${screenName}"]`).classList.add('active');
        this.state.currentScreen = screenName;
      },

      startUserMode() {
        this.state.userChatId = 'user_' + Date.now();
        this.state.currentUser = { username: utils.generateUsername() };
        
        document.getElementById('userAvatar').textContent = this.state.currentUser.username.charAt(0).toUpperCase();
        document.getElementById('userUsername').textContent = this.state.currentUser.username;
        
        this.showScreen('userChat');
        this.startUserSync();
      },

      requestAdminAccess() {
        document.getElementById('adminPassword').value = '';
        document.getElementById('adminAuthModal').classList.add('active');
      },

      closeAdminAuth() {
        document.getElementById('adminAuthModal').classList.remove('active');
      },

      verifyAdminPassword() {
        const password = document.getElementById('adminPassword').value;
        if (password === CONFIG.ADMIN_PASSWORD) {
          this.closeAdminAuth();
          this.enterAdminMode();
        } else {
          alert('Incorrect password');
          document.getElementById('adminPassword').value = '';
        }
      },

      enterAdminMode() {
        this.state.isAdmin = true;
        this.showScreen('admin');
        this.updateAdminList();
        
        // Check for new messages every 2 seconds
        this.adminCheckInterval = setInterval(() => this.checkForNewMessages(), 2000);
      },

      exitAdminMode() {
        if (this.adminCheckInterval) clearInterval(this.adminCheckInterval);
        this.state.isAdmin = false;
        this.state.currentConversationId = null;
        this.showScreen('intro');
      },

      updateAdminList() {
        const conversations = storage.getConversations();
        const list = document.getElementById('conversationList');
        
        const convArray = Object.values(conversations).sort((a, b) => 
          new Date(b.createdAt) - new Date(a.createdAt)
        );

        const waiting = convArray.filter(c => {
          const hasUnreplied = c.messages.some(m => !m.isAdmin);
          return hasUnreplied;
        }).length;

        document.getElementById('totalConversations').textContent = `${convArray.length} total`;
        document.getElementById('activeConversations').textContent = `${waiting} new`;

        if (convArray.length === 0) {
          list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 12px;">No conversations yet</div>';
          return;
        }

        list.innerHTML = '';
        convArray.forEach(conv => {
          const hasUnreplied = conv.messages.some(m => !m.isAdmin);
          
          const item = document.createElement('div');
          item.className = `conversation-item ${this.state.currentConversationId === conv.id ? 'active' : ''}`;
          item.onclick = () => this.selectConversation(conv.id);

          const userEl = document.createElement('div');
          userEl.className = 'conv-user';
          userEl.textContent = conv.username;

          const previewEl = document.createElement('div');
          previewEl.className = 'conv-preview';
          const lastMsg = conv.messages[conv.messages.length - 1];
          previewEl.textContent = lastMsg ? lastMsg.text.substring(0, 35) : 'No messages';

          const statusEl = document.createElement('div');
          statusEl.className = 'conv-status ' + (hasUnreplied ? 'waiting' : 'replied');
          statusEl.textContent = hasUnreplied ? 'Awaiting' : 'Replied';

          item.appendChild(userEl);
          item.appendChild(previewEl);
          item.appendChild(statusEl);
          list.appendChild(item);
        });
      },

      checkForNewMessages() {
        const conversations = storage.getConversations();
        let hasChanges = false;

        for (const convId in conversations) {
          const conv = conversations[convId];
          const lastLength = this.state.lastConvLength[convId] || 0;
          if (conv.messages.length !== lastLength) {
            hasChanges = true;
            break;
          }
        }

        if (hasChanges) {
          this.updateAdminList();
          if (this.state.currentConversationId) {
            this.renderAdminChat(this.state.currentConversationId);
          }
        }
      },

      selectConversation(conversationId) {
        this.state.currentConversationId = conversationId;
        this.renderAdminChat(conversationId);
      },

      renderAdminChat(conversationId) {
        const conversations = storage.getConversations();
        const conv = conversations[conversationId];
        if (!conv) return;

        this.state.lastConvLength[conversationId] = conv.messages.length;

        const chatArea = document.getElementById('adminChatArea');
        chatArea.innerHTML = '';

        // Header
        const header = document.createElement('div');
        header.className = 'admin-chat-header';
        const hasUnreplied = conv.messages.some(m => !m.isAdmin);
        const status = hasUnreplied ? 'Awaiting' : 'Replied';
        header.innerHTML = `
          <div class="admin-user-info">
            <h3>${conv.username}</h3>
            <p>${utils.formatDate(conv.createdAt)} • ${status}</p>
          </div>
        `;
        chatArea.appendChild(header);

        // Messages
        const messagesDiv = document.createElement('div');
        messagesDiv.className = 'messages-container';
        conv.messages.forEach(msg => {
          const messageEl = document.createElement('div');
          messageEl.className = `message ${msg.isAdmin ? 'own' : 'other'}`;

          const bubbleEl = document.createElement('div');
          bubbleEl.className = 'message-bubble';
          bubbleEl.textContent = msg.text;

          const timeEl = document.createElement('div');
          timeEl.className = 'message-time';
          timeEl.textContent = utils.formatTime(msg.timestamp);

          messageEl.appendChild(bubbleEl);
          messageEl.appendChild(timeEl);
          messagesDiv.appendChild(messageEl);
        });
        chatArea.appendChild(messagesDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // Reply area (always visible)
        const replyArea = document.createElement('div');
        replyArea.className = 'reply-area';
        replyArea.innerHTML = `
          <textarea class="input" id="adminReplyInput" placeholder="Type a reply..."></textarea>
          <button class="btn-send" onclick="app.sendAdminReply('${conversationId}')">✓</button>
        `;
        chatArea.appendChild(replyArea);
        setTimeout(() => document.getElementById('adminReplyInput').focus(), 100);
      },

      sendAdminReply(conversationId) {
        const input = document.getElementById('adminReplyInput');
        const reply = input.value.trim();
        if (!reply) return;

        storage.addMessage(conversationId, {
          text: reply,
          isAdmin: true,
          timestamp: new Date().toISOString()
        });

        input.value = '';
        input.style.height = 'auto';
        this.renderAdminChat(conversationId);
      },

      startUserSync() {
        if (this.userSyncInterval) clearInterval(this.userSyncInterval);
        
        this.userSyncInterval = setInterval(() => {
          this.renderUserChat();
        }, 1000);
      },

      sendUserMessage() {
        const input = document.getElementById('userInput');
        const message = input.value.trim();
        if (!message) return;

        storage.addMessage(this.state.userChatId, {
          username: this.state.currentUser.username,
          text: message,
          isAdmin: false,
          timestamp: new Date().toISOString()
        });

        input.value = '';
        input.style.height = 'auto';
        this.renderUserChat();
      },

      renderUserChat() {
        const conversations = storage.getConversations();
        const conv = conversations[this.state.userChatId];
        if (!conv) return;

        const messagesDiv = document.getElementById('userMessageArea');
        messagesDiv.innerHTML = '';

        conv.messages.forEach(msg => {
          const messageEl = document.createElement('div');
          messageEl.className = `message ${msg.isAdmin ? 'own' : 'other'}`;

          const bubbleEl = document.createElement('div');
          bubbleEl.className = 'message-bubble';
          bubbleEl.textContent = msg.text;

          const timeEl = document.createElement('div');
          timeEl.className = 'message-time';
          timeEl.textContent = utils.formatTime(msg.timestamp);

          messageEl.appendChild(bubbleEl);
          messageEl.appendChild(timeEl);
          messagesDiv.appendChild(messageEl);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      },

      endUserChat() {
        document.getElementById('endChatModal').classList.add('active');
      },

      closeEndChatModal() {
        document.getElementById('endChatModal').classList.remove('active');
      },

      confirmEndUserChat() {
        if (this.userSyncInterval) clearInterval(this.userSyncInterval);
        this.closeEndChatModal();
        this.showScreen('intro');
      },
    };

    // Auto-resize textarea
    document.addEventListener('input', (e) => {
      if (e.target.classList.contains('input')) {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
      }
    });

    // Send on Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'userInput') {
        e.preventDefault();
        app.sendUserMessage();
      }
      if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'adminReplyInput') {
        e.preventDefault();
        const conversationId = app.state.currentConversationId;
        app.sendAdminReply(conversationId);
      }
    });
  </script>
</body>
</html>
